# ===========================================
# 거래 규칙
# ===========================================
trading_rules:
  # 현금 최소화 원칙
  cash_policy:
    target_cash_ratio: 0  # 0% 현금 유지
    max_cash_days: 14  # 최대 2주만 현금 보유
    
  # 매도 시 즉시 재투자
  reinvestment:
    required: true
    options_to_show: 5  # 상위 5개 대안 제시
    
  # 계좌별 규칙
  tfsa1:
    allow_partial_sell: true  # 부분 매도 가능
    allow_leverage_etf: true  # 레버리지 ETF 허용
    
  tfsa2:
    allow_partial_sell: false  # All-in만
    allow_leverage_etf: false  # 레버리지 금지

# ===========================================
# 비용 계산 설정
# ===========================================
cost_settings:
  broker: "Wealthsimple"
  fx_fee: 0.015  # 1.5% 환전 수수료 (양방향)
  default_holding_months: 3  # 기본 보유 기간
  
  # 순수익 계산 시 고려사항
  include_in_calculation:
    - fx_fee
    - mer
    - dividend_tax  # 미국주식 15% 원천징수

# ===========================================
# 추천 기준
# ===========================================
recommendation_rules:
  # TFSA1: 수익성 우선
  tfsa1:
    priority: "net_return"  # 순수익 최우선
    min_confidence: 65
    time_horizon: "short_to_mid"  # 1주~3개월
    
    scoring_weights:
      profit_potential: 0.40
      momentum: 0.30
      correlation: 0.20
      liquidity: 0.10
  
  # TFSA2: 안정성 우선
  tfsa2:
    priority: "stability"
    min_confidence: 80
    time_horizon: "mid_to_long"  # 6개월+
    
    scoring_weights:
      stability: 0.50
      preservation: 0.30
      liquidity: 0.20

# ===========================================
# 순위 표시 규칙
# ===========================================
ranking_rules:
  sort_by: "net_return"  # 순수익 기준 정렬
  show_top: 5  # 상위 5개
  
  # 동점일 때 우선순위
  tie_breaker:
    - "prefer_canadian"  # 캐나다 우선
    - "lower_risk"
    - "higher_liquidity"
  
  # 표시 옵션
  display:
    show_cost_breakdown: true  # 비용 상세
    show_comparison: true  # 1위 vs 2위
    use_emoji: true  # 🥇🥈🥉

# ===========================================
# 긴급 알림 트리거
# ===========================================
emergency_triggers:
  price_change:
    threshold: 0.07  # ±7% 이상
    
  keywords:
    negative: 
      - "bankruptcy"
      - "investigation"
      - "fraud"
      - "accounting scandal"
      - "CEO resign"
      - "delisting"
      - "trading halt"
      - "lawsuit"
      - "recall"
    
    positive: 
      - "merger"
      - "acquisition"
      - "earnings beat"
      - "breakthrough"
      - "FDA approval"
      - "partnership"
      - "buyback"
  
  market_events:
    - "emergency rate hike"
    - "circuit breaker"
    - "geopolitical crisis"
    - "bank failure"
    - "market crash"

# ===========================================
# 스왑 우선순위 설정
# ===========================================
swap_priority:
  tfsa1:
    sell_first:
      - "duplicate assets"  # VFV vs VOO
      - "losing positions"
      - "weak performers"
    
    protect:
      - "purpose funds"
  
  tfsa2:
    # 전량 교체만 가능
    protect_before_withdrawal:
      days: 14  # 출금 2주 전부터 보호

# ===========================================
# 월간 현금 유입
# ===========================================
monthly_cash_inflow:
  tfsa1: 100  # TFSA 1 매달 $100
  tfsa2: 0    # TFSA 2는 전량 교체 방식
