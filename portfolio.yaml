# ===========================================
# 거래 규칙
# ===========================================
trading_rules:
  cash_policy:
    target_cash_ratio: 0
    max_cash_days: 14
    
  reinvestment:
    required: true
    options_to_show: 5
    
  tfsa1:
    allow_partial_sell: true
    allow_leverage_etf: true
    concentration_threshold: 0.10  # 점수 차이 0.10 이상 → 집중 투자
    partial_sell_threshold: 0.15   # -0.15 ~ -0.24 → 30~50% 부분매도
    half_sell_threshold: 0.25      # -0.25 ~ -0.34 → 50% 매도
    full_sell_threshold: 0.35      # -0.35 이상 → 전량 매도
    
  tfsa2:
    allow_partial_sell: false      # 전량 교체만
    allow_leverage_etf: false
    full_sell_threshold: 0.30      # -0.30 이상 → 전량 교체

# ===========================================
# 비용 계산 설정
# ===========================================
cost_settings:
  broker: "Wealthsimple"
  fx_fee: 0.015          # 1.5% 환전 수수료 (USD 자산 왕복)
  default_holding_months: 3

# ===========================================
# 추천 기준
# ===========================================
recommendation_rules:
  tfsa1:
    priority: "net_return"
    min_confidence: 65
    time_horizon: "short_to_mid"
    scoring_weights:
      profit_potential: 0.40
      momentum: 0.30
      correlation: 0.20
      liquidity: 0.10
  
  tfsa2:
    priority: "stability"
    min_confidence: 80
    time_horizon: "mid_to_long"
    scoring_weights:
      stability: 0.50
      preservation: 0.30
      liquidity: 0.20

# ===========================================
# 순위 표시 규칙
# ===========================================
ranking_rules:
  sort_by: "weighted_score"
  show_top: 5
  alert_threshold: 0.15    # ±0.15 이상만 알림
  
  tie_breaker:
    - "prefer_canadian"
    - "lower_risk"
    - "higher_liquidity"
  
  display:
    show_cost_breakdown: true
    use_emoji: true

# ===========================================
# 긴급 알림 트리거
# ===========================================
emergency_triggers:
  price_change:
    threshold: 0.07
    
  keywords:
    negative: 
      - "bankruptcy"
      - "investigation"
      - "fraud"
      - "accounting scandal"
      - "CEO resign"
      - "delisting"
      - "trading halt"
      - "lawsuit"
      - "recall"
    
    positive: 
      - "merger"
      - "acquisition"
      - "earnings beat"
      - "breakthrough"
      - "FDA approval"
      - "partnership"
      - "buyback"
  
  market_events:
    - "emergency rate hike"
    - "circuit breaker"
    - "geopolitical crisis"
    - "bank failure"
    - "market crash"

# ===========================================
# 스왑 우선순위 설정
# ===========================================
swap_priority:
  tfsa1:
    sell_first:
      - "duplicate assets"
      - "losing positions"
      - "weak performers"
    protect:
      - "purpose funds"
  
  tfsa2:
    protect_before_withdrawal:
      days: 14

# ===========================================
# 월간 현금 유입
# ===========================================
monthly_cash_inflow:
  tfsa1: 100
  tfsa2: 0
