name: Daily Digest

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  run-digest:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Daily Digest
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
      - name: Push data files
        run: |
          git config user.name 'Financial Bot'
          git config user.email 'bot@financial.ai'
          git add -f pending_trades.json current_portfolio.json recommendation_history.json watch_state.json
          git diff --staged --quiet || git commit -m "📊 데이터 업데이트"
          git push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
