name: Intraday Monitor

on:
  schedule:
    # 09:30-16:00 EST = 14:30-21:00 UTC
    # 30분마다: :00, :30
    # 월-금만
    - cron: '0,30 14-20 * * 1-5'
  
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt --break-system-packages
      
      - name: Run Intraday Monitor
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python intraday_monitor.py
      - name: Push data files
        run: |
          git config user.name 'Financial Bot'
          git config user.email 'bot@financial.ai'
          git add -f pending_trades.json seen_intraday.json
          git diff --staged --quiet || git commit -m "📊 장중 데이터 업데이트"
          git push
