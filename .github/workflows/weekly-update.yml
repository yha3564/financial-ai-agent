name: Weekly Hot Stock Update

on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:

jobs:
  update-portfolio:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Weekly Updater
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python weekly_updater.py
      
      - name: Commit changes
        run: |
          git config user.name 'Financial Bot'
          git config user.email 'bot@financial.ai'
          git add portfolio.yaml
          git diff --staged --quiet || git commit -m "Auto-update: Weekly hot stocks"
          git push
